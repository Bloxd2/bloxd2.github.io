<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cubic - A Editor</title>
    <style>
        /* Reset and Immersive Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* No scrollbars on the parent page */
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container to hold the embedded site */
        .site-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* The iframe embedding the Base44 site */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Fullscreen button styling */
        .fullscreen-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
            user-select: none;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* Simple loading text */
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #555;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="site-wrapper">
        <div class="loading-text">Loading Cubic Editor...</div>
        
        <!-- Updated URL to the base44.app domain -->
        <iframe 
            src="https://cubiceditor.base44.app/" 
            allow="autoplay; fullscreen; keyboard; clipboard-read; clipboard-write"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Toggle button to make the experience fully immersive -->
    <button class="fullscreen-btn" onclick="toggleFS()">Toggle Fullscreen</button>

    <script>
        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {
                    console.log("Fullscreen request denied.");
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
